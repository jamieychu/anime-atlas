    function MapTab() {
      const { state, actions, getShow, claimableShows } = useApp();
      const [viewMode, setViewMode] = React.useState('list'); // 'list' | 'constellation'
      
      // Reset to list view when scenario changes
      React.useEffect(() => { setViewMode('list'); }, [state.scenario]);
      
      const chartAllBar = claimableShows.length >= 3 ? (
        <div className="px-4 pt-4 pb-0">
          <div className="flex items-center justify-between bg-cr-surface border border-cr-orange/20 rounded-lg px-3 py-2.5 mb-1">
            <div className="flex items-center gap-2">
              <iconify-icon icon="lucide:sparkles" width="14" class="text-cr-orange" />
              <span className="text-[11px] text-cr-text-secondary">{claimableShows.length}{" watched show" + (claimableShows.length > 1 ? "s" : "") + " ready to\u00A0chart"}</span>
            </div>
            <button onClick={actions.executeBatchClaim} className="text-cr-orange text-[11px] font-bold active:opacity-70 transition-opacity">
              {"Chart\u00A0All"}
            </button>
          </div>
        </div>
      ) : null;
      
      // View mode toggle bar
      const viewToggle = (
        <div className="px-4 pt-3 pb-1 flex items-center justify-between">
          <div className="flex items-center gap-1 bg-cr-surface rounded-lg p-0.5 border border-cr-border">
            <button onClick={() => setViewMode('list')} className={`px-3 py-1.5 rounded-md text-[10px] font-bold uppercase tracking-wider transition-colors ${viewMode === 'list' ? 'bg-cr-orange/20 text-cr-orange' : 'text-cr-text-muted'}`}>
              <iconify-icon icon="lucide:list" width="12" class="mr-1" />List
            </button>
            <button onClick={() => setViewMode('constellation')} className={`px-3 py-1.5 rounded-md text-[10px] font-bold uppercase tracking-wider transition-colors ${viewMode === 'constellation' ? 'bg-cr-orange/20 text-cr-orange' : 'text-cr-text-muted'}`}>
              <iconify-icon icon="lucide:orbit" width="12" class="mr-1" />Map
            </button>
          </div>
        </div>
      );
      
      if (viewMode === 'constellation') {
        return <>{viewToggle}<ConstellationView onClose={() => setViewMode('list')} /></>;
      }
      
      // Render based on current layer
      if (state.atlasLayer === 'L1') return <>{chartAllBar}{viewToggle}<MapLayerAllGenres /></>;
      if (state.atlasLayer === 'L2') return <>{chartAllBar}{viewToggle}<MapLayerGenreFocus /></>;
      if (state.atlasLayer === 'L3') return <>{chartAllBar}{viewToggle}<MapLayerRegionFocus /></>;
      if (state.atlasLayer === 'L4') return <>{chartAllBar}{viewToggle}<MapLayerNodeFocus /></>;
      
      return <>{chartAllBar}{viewToggle}<MapLayerAllGenres /></>;
    }

    // Breadcrumb component
    function AtlasBreadcrumb() {
      const { state, actions } = useApp();
      const genre = state.selectedGenre ? GENRES[state.selectedGenre] : null;
      const region = state.selectedRegion ? REGIONS[state.selectedRegion] : null;
      const show = state.focusedShowId ? SHOWS[state.focusedShowId] : null;
      
      return (
        <div className="flex items-center gap-2 text-[10px] font-black uppercase tracking-wider mb-4">
          <div className="flex items-center gap-2 flex-wrap flex-1">
            <button onClick={() => actions.navigateBreadcrumb('L1')} className={`${state.atlasLayer === 'L1' ? 'text-cr-orange' : 'text-cr-text-muted hover:text-white'} transition-colors`}>All</button>
            {genre && (
              <>
                <span className="text-cr-border">/</span>
                <button onClick={() => actions.navigateBreadcrumb('L2')} className={`${state.atlasLayer === 'L2' ? 'text-cr-orange' : 'text-cr-text-muted hover:text-white'} transition-colors`}>{genre.name}</button>
              </>
            )}
            {region && (
              <>
                <span className="text-cr-border">/</span>
                <button onClick={() => actions.navigateBreadcrumb('L3')} className={`${state.atlasLayer === 'L3' ? 'text-cr-orange' : 'text-cr-text-muted hover:text-white'} transition-colors`}>{region.name}</button>
              </>
            )}
            {show && state.atlasLayer === 'L4' && (
              <>
                <span className="text-cr-border">/</span>
                <span className="text-cr-orange truncate max-w-[100px]">{show.title}</span>
              </>
            )}
          </div>
        </div>
      );
    }

    // L1: All Genres
    function MapLayerAllGenres() {
      const { actions, state } = useApp();
      
      // Separate enabled vs placeholder genres
      const enabledGenres = Object.values(GENRES).filter(g => g.enabled);
      const placeholderGenres = Object.values(GENRES).filter(g => !g.enabled);
      
      return (
        <div className="px-4 py-4">
          <AtlasBreadcrumb />
          
          <h2 className="text-lg font-bold text-white mb-2">Pick a Genre</h2>
          <p className="text-sm text-cr-text-secondary mb-6">Choose a genre to see its map.</p>
          
          <div className="grid grid-cols-2 gap-4 mb-4">
            {enabledGenres.map(genre => {
              const chartedInGenre = state.chartedShows.filter(id => SHOWS[id]?.genre === genre.id).length;
              
              return (
                <button 
                  key={genre.id} 
                  onClick={() => actions.navigateToGenre(genre.id)}
                  className="bg-cr-surface rounded-2xl p-4 border border-cr-border text-left active:scale-95 transition-transform hover:border-cr-orange/50"
                >
                  <div className="w-12 h-12 rounded-xl mb-3 flex items-center justify-center" style={{ backgroundColor: `${genre.color}20` }}>
                    <iconify-icon icon={genre.icon} width="24" style={{ color: genre.color }} />
                  </div>
                  <h3 className="text-base font-bold text-white mb-1">{genre.name}</h3>
                  <p className="text-[10px] text-cr-text-muted">{chartedInGenre} / {genre.totalShows} shows</p>
                  {chartedInGenre > 0 && (
                    <div className="mt-2 h-1 bg-cr-bg rounded-full overflow-hidden">
                      <div className="h-full rounded-full" style={{ width: `${(chartedInGenre / genre.totalShows) * 100}%`, backgroundColor: genre.color }} />
                    </div>
                  )}
                </button>
              );
            })}
          </div>
          
          {/* Placeholder genres - out of scope for demo */}
          <p className="text-[10px] font-bold text-cr-text-muted uppercase tracking-wider mb-3">Not in Demo</p>
          <div className="grid grid-cols-2 gap-3 mb-6">
            {placeholderGenres.map(genre => (
              <div 
                key={genre.id} 
                className="bg-cr-surface/40 rounded-xl p-3 border border-cr-border/50 opacity-40"
              >
                <div className="flex items-center gap-3">
                  <div className="w-8 h-8 rounded-lg flex items-center justify-center" style={{ backgroundColor: `${genre.color}10` }}>
                    <iconify-icon icon={genre.icon} width="16" style={{ color: genre.color, opacity: 0.5 }} />
                  </div>
                  <div>
                    <h4 className="text-sm font-medium text-cr-text-muted">{genre.name}</h4>
                    <p className="text-[9px] text-cr-text-muted/60">{genre.totalShows} shows</p>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // L2: Genre Focus
    function MapLayerGenreFocus() {
      const { state, actions, getShow } = useApp();
      const genre = GENRES[state.selectedGenre];
      if (!genre) return null;
      
      const landmarksCharted = genre.landmarks.filter(id => state.chartedShows.includes(id)).length;
      
      // Cluster unlock logic: 3/7 landmarks = first 2 clusters, 5/7 = 3 clusters, 7/7 = all
      const getUnlockedRegionCount = () => {
        if (landmarksCharted >= 7) return 4;
        if (landmarksCharted >= 5) return 3;
        if (landmarksCharted >= 3) return 2;
        if (landmarksCharted >= 1) return 1;
        return 0;
      };
      const unlockedRegionCount = getUnlockedRegionCount();
      
      return (
        <div className="px-4 py-4">
          <AtlasBreadcrumb />
          
          {/* Landmarks Section - Larger thumbnails */}
          <div className="mb-6">
            <div className="flex items-center justify-between mb-3">
              <h3 className="text-sm font-bold text-white flex items-center gap-2">
                <iconify-icon icon="lucide:mountain" width="16" class="text-cr-orange" />
                Landmarks
              </h3>
              <span className="text-xs text-cr-text-muted">{landmarksCharted}/{genre.landmarks.length}</span>
            </div>
            <div className="bg-cr-surface rounded-xl p-4 border border-cr-border">
              <div className="flex gap-3 overflow-x-auto hide-scrollbar pb-2">
                {genre.landmarks.map(showId => {
                  const show = getShow(showId);
                  if (!show) return null;
                  const isCharted = state.chartedShows.includes(showId);
                  const isWatched = state.watchedShows.includes(showId);
                  return (
                    <button 
                      key={showId} 
                      onClick={() => actions.navigateToShow(showId)}
                      className="shrink-0 w-[88px] text-center active:scale-95 transition-transform"
                    >
                      <div className={`relative w-[88px] h-[88px] rounded-xl overflow-hidden mb-2 border-2 ${isCharted ? 'border-cr-success' : isWatched ? 'border-cr-orange' : 'border-cr-border'}`}>
                        <ShowImage showId={showId} title={show.title} className="w-full h-full object-cover" orientation="landscape" />
                        {/* Landmark badge */}
                        <div className="absolute top-1 left-1 px-1.5 py-0.5 bg-black/70 rounded-full">
                          <iconify-icon icon="lucide:mountain" width="10" class="text-cr-orange" />
                        </div>
                        {isCharted && (
                          <div className="absolute bottom-1 right-1 w-5 h-5 bg-cr-success rounded-full flex items-center justify-center">
                            <iconify-icon icon="lucide:check" width="12" class="text-white" />
                          </div>
                        )}
                      </div>
                      <p className="text-[10px] text-cr-text-secondary truncate leading-tight">{show.title.split(':')[0]}</p>
                    </button>
                  );
                })}
              </div>
              {landmarksCharted === 0 && (
                <p className="text-[10px] text-cr-text-muted mt-2 text-center">{"Watch & chart landmarks to unlock\u00A0regions"}</p>
              )}
              {landmarksCharted > 0 && landmarksCharted < 7 && (
                <p className="text-[10px] text-cr-orange mt-2 text-center">
                  {unlockedRegionCount < 4 ? `${unlockedRegionCount}/4 regions unlocked • Chart ${landmarksCharted < 3 ? 3 - landmarksCharted : landmarksCharted < 5 ? 5 - landmarksCharted : 7 - landmarksCharted} more for next unlock` : 'All regions unlocked!'}
                </p>
              )}
            </div>
          </div>
          
          {/* Regions Section - Enhanced cards with unlock state */}
          <div>
            <h3 className="text-sm font-bold text-white mb-3 flex items-center gap-2">
              <iconify-icon icon="lucide:map" width="16" class="text-cr-orange" />
              Regions
            </h3>
            <div className="space-y-3">
              {genre.regions.map((regionId, index) => {
                const region = REGIONS[regionId];
                if (!region) return null;
                const chartedInRegion = region.shows.filter(id => state.chartedShows.includes(id)).length;
                const isUnlocked = index < unlockedRegionCount;
                
                if (!isUnlocked) {
                  // Locked region card - show gradient tease with small lock badge
                  const nextUnlockAt = unlockedRegionCount < 1 ? 1 : unlockedRegionCount < 2 ? 3 : unlockedRegionCount < 3 ? 5 : 7;
                  const needed = nextUnlockAt - landmarksCharted;
                  return (
                    <div 
                      key={regionId}
                      className={`w-full rounded-xl p-4 border border-cr-border/60 flex items-center gap-4 bg-gradient-to-r ${region.gradient}`}
                    >
                      <div className="w-10 h-10 rounded-lg flex items-center justify-center bg-cr-bg/40 relative">
                        <iconify-icon icon={region.icon} width="20" style={{ color: genre.color }} className="opacity-60" />
                      </div>
                      <div className="flex-1">
                        <div className="flex items-center gap-2 mb-0.5">
                          <iconify-icon icon="lucide:lock" width="12" class="text-cr-text-muted" />
                          <h4 className="text-sm font-bold text-cr-text-secondary">Locked</h4>
                        </div>
                        <p className="text-[10px] text-cr-text-muted">Chart {needed} more landmark{needed !== 1 ? 's' : ''} to unlock</p>
                      </div>
                    </div>
                  );
                }
                
                return (
                  <button 
                    key={regionId}
                    onClick={() => actions.navigateToRegion(regionId)}
                    className={`w-full rounded-xl p-4 border border-cr-border text-left active:scale-95 transition-transform hover:border-cr-orange/50 flex items-center gap-4 bg-gradient-to-r ${region.gradient} bg-cr-surface`}
                  >
                    <div className="w-10 h-10 rounded-lg flex items-center justify-center bg-cr-bg/50">
                      <iconify-icon icon={region.icon} width="20" style={{ color: genre.color }} />
                    </div>
                    <div className="flex-1">
                      <h4 className="text-sm font-bold text-white mb-0.5">{region.name}</h4>
                      <p className="text-[10px] text-cr-text-muted">{chartedInRegion} / {region.totalShows} charted</p>
                    </div>
                    <iconify-icon icon="lucide:chevron-right" width="20" class="text-cr-text-muted" />
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    // L3: Region Focus
    function MapLayerRegionFocus() {
      const { state, actions, getShow } = useApp();
      const region = REGIONS[state.selectedRegion];
      if (!region) return null;
      
      const chartedInRegion = region.shows.filter(id => state.chartedShows.includes(id)).length;
      const lockedCount = region.totalShows - region.shows.length;
      
      // Use shared show state computation — single source of truth
      const showStates = computeAllShowStates(state.chartedShows, state.watchedShows);
      
      const visibleShows = region.shows.filter(id => showStates[id] !== 'locked');
      const hiddenShowCount = region.shows.length - visibleShows.length;
      
      // Group visible shows by tier for sectioned display
      const tierOrder = ['gateway', 'trails', 'offthemap', 'hidden'];
      const tierDisplayName = { gateway: 'Gateway', trails: 'On the Trail', offthemap: 'Off the Map', hidden: 'Terra Incognita' };
      
      return (
        <div className="px-4 py-4">
          <AtlasBreadcrumb />
          
          <h2 className="text-lg font-bold text-white mb-1">{region.name}</h2>
          <p className="text-sm text-cr-text-secondary mb-4">{chartedInRegion} / {region.totalShows} shows charted</p>
          
          {/* Show grid by tier sections — only tiers with visible shows render */}
          {tierOrder.map(tier => {
            const tierShows = visibleShows.filter(id => getShow(id)?.tier === tier);
            if (tierShows.length === 0) return null;
            return (
              <div key={tier} className="mb-5">
                <div className="flex items-center gap-2 mb-2">
                  <span className="text-[10px] font-black uppercase tracking-wider text-cr-text-muted">{tierDisplayName[tier]}</span>
                  <span className="text-[9px] text-cr-text-muted/60">{tierShows.filter(id => state.chartedShows.includes(id)).length}/{tierShows.length} charted</span>
                </div>
                <div className="grid grid-cols-3 gap-3">
                  {tierShows.map(showId => {
                    const show = getShow(showId);
                    if (!show) return null;
                    const isCharted = state.chartedShows.includes(showId);
                    const isWatched = state.watchedShows.includes(showId);
                    return (
                      <button 
                        key={showId}
                        onClick={() => actions.navigateToShow(showId)}
                        className="text-left active:scale-95 transition-transform"
                      >
                        <div className={`aspect-[2/3] rounded-lg overflow-hidden mb-2 border-2 ${isCharted ? 'border-cr-success' : isWatched ? 'border-cr-orange animate-pulse' : 'border-transparent'}`}>
                          <ShowImage showId={showId} title={show.title} className="w-full h-full object-cover" />
                        </div>
                        <p className="text-[10px] font-medium text-white truncate">{show.title}</p>
                        <p className="text-[9px] text-cr-text-muted">
                          {isCharted ? '✓ Charted' : isWatched ? 'Ready to chart' : ''}
                        </p>
                      </button>
                    );
                  })}
                </div>
              </div>
            );
          })}
          
          {/* Hidden shows teaser — shows not yet revealed by connections */}
          {hiddenShowCount > 0 && (
            <div className="bg-cr-surface rounded-xl border border-dashed border-cr-border/50 p-4 mb-4">
              <div className="flex items-center gap-3">
                <iconify-icon icon="lucide:lock" width="18" class="text-cr-text-muted/50" />
                <div>
                  <p className="text-xs font-bold text-cr-text-secondary">{hiddenShowCount} more show{hiddenShowCount !== 1 ? 's' : ''} to discover</p>
                  <p className="text-[10px] text-cr-text-muted">Chart shows to reveal connections</p>
                </div>
              </div>
            </div>
          )}
          
          {/* Placeholder tiles for shows not in prototype (stub regions) */}
          {lockedCount > 0 && (
            <div className="mb-4">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] font-black uppercase tracking-wider text-cr-text-muted/50">Chart more to unlock</span>
              </div>
              <div className="grid grid-cols-3 gap-3">
                {[...Array(Math.min(lockedCount, 6))].map((_, i) => (
                  <div key={`locked-${i}`} className="text-left">
                    <div className="aspect-[2/3] rounded-lg bg-cr-surface border border-dashed border-cr-border/50 mb-2 flex items-center justify-center">
                      <iconify-icon icon="lucide:lock" width="20" class="text-cr-text-muted/40" />
                    </div>
                    <p className="text-[10px] font-medium text-cr-text-muted/50">???</p>
                    <p className="text-[9px] text-cr-text-muted/30">Locked</p>
                  </div>
                ))}
              </div>
              {lockedCount > 6 && (
                <div className="mt-3 flex items-center justify-center gap-2 text-cr-text-muted">
                  <iconify-icon icon="lucide:more-horizontal" width="16" />
                  <span className="text-xs">+{lockedCount - 6} more shows to discover</span>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // L4: Node Focus (original MapTab content, updated)
    function MapLayerNodeFocus() {
      const { state, actions, getShow, claimableShows } = useApp();
      const containerRef = useRef(null);
      const focusedShow = state.focusedShowId ? getShow(state.focusedShowId) : null;
      const isClaimable = claimableShows.includes(state.focusedShowId);
      const isCharted = state.chartedShows.includes(state.focusedShowId);
      const isWatched = state.watchedShows.includes(state.focusedShowId);

      // Scroll to top when focused show changes
      useEffect(() => {
        if (containerRef.current) {
          const scrollParent = containerRef.current.closest('.scroll-container');
          if (scrollParent) scrollParent.scrollTop = 0;
        }
      }, [state.focusedShowId]);

      if (!focusedShow) {
        return (
          <div ref={containerRef} className="px-4 py-4">
            <AtlasBreadcrumb />
            <div className="py-12 text-center">
              <iconify-icon icon="lucide:map" width="48" class="text-cr-text-muted mb-4" />
              <h2 className="text-lg font-bold text-white mb-2">Select a Show</h2>
              <p className="text-sm text-cr-text-secondary">Tap any show above to see details.</p>
            </div>
          </div>
        );
      }
      
      // Calculate expected connections based on tier
      const expectedConnections = focusedShow.tier === 'landmark' ? 3 : focusedShow.tier === 'gateway' ? 5 : focusedShow.tier === 'trails' ? 3 : 2;
      const actualConnections = focusedShow.connections?.length || 0;
      const placeholderCount = Math.max(0, expectedConnections - actualConnections);

      return (
        <div ref={containerRef} className="px-4 py-4 pb-6">
          <AtlasBreadcrumb />
          
          {/* Back to previous show */}
          {state.showHistory.length > 0 && getShow(state.showHistory[state.showHistory.length - 1]) && (
            <button 
              onClick={() => actions.goBack()}
              className="flex items-center gap-1.5 mb-3 mt-1 text-cr-text-muted hover:text-white transition-colors active:opacity-70"
            >
              <iconify-icon icon="lucide:arrow-left" width="14" />
              <span className="text-xs">Back to {getShow(state.showHistory[state.showHistory.length - 1]).title}</span>
            </button>
          )}
          
          {/* Hero card */}
          <div className={`relative rounded-[20px] overflow-hidden mb-4 ${isClaimable?'animate-glow':''}`}>
            <div className="aspect-video"><ShowImage showId={focusedShow.id} title={focusedShow.title} className="w-full h-full object-cover" orientation="landscape" /></div>
            <div className="absolute inset-0 bg-gradient-to-t from-cr-bg via-transparent to-transparent" />
            {isClaimable && <div className="absolute top-3 left-3 px-2.5 py-1 bg-cr-orange rounded-full flex items-center gap-1.5"><iconify-icon icon="lucide:sparkles" width="12" class="text-white" /><span className="text-[9px] font-black text-white uppercase leading-none">Ready to Chart</span></div>}
            {isCharted && <div className="absolute top-3 left-3 px-2.5 py-1 bg-cr-success rounded-full flex items-center gap-1.5"><iconify-icon icon="lucide:check" width="12" class="text-white" /><span className="text-[9px] font-black text-white uppercase leading-none">Charted</span></div>}
            {!isWatched && !isCharted && <div className="absolute top-3 left-3 px-2.5 py-1 bg-cr-surface/80 rounded-full flex items-center gap-1.5"><iconify-icon icon="lucide:eye" width="12" class="text-cr-text-muted" /><span className="text-[9px] font-black text-cr-text-muted uppercase leading-none">Not Watched</span></div>}
            <div className="absolute bottom-3 left-3 right-3">
              <p className="text-[9px] font-bold text-cr-orange uppercase tracking-wider mb-0.5">{focusedShow.tier==='landmark'?'Landmark':focusedShow.tier==='gateway'?'Gateway':focusedShow.tier==='trails'?'On the Trail':'Terra Incognita'}</p>
              <h2 className="text-xl font-display font-bold text-white mb-0.5">{focusedShow.title}</h2>
              <p className="text-[10px] text-cr-text-secondary">{focusedShow.meta}</p>
            </div>
          </div>
          
          {/* Action buttons */}
          <div className="mb-5">
            {!isWatched && (
              <>
                <button 
                  onClick={() => actions.simulateWatch(focusedShow.id)}
                  className="w-full py-3.5 bg-cr-orange rounded-xl flex items-center justify-center gap-2 text-white font-bold active:scale-95 transition-transform"
                >
                  <iconify-icon icon="lucide:play" width="18" />
                  Simulate Watch
                </button>
                <p className="text-[10px] text-cr-text-muted text-center mt-1.5">{"Watch 1 episode to chart this\u00A0show"}</p>
              </>
            )}
            {isClaimable && (
              <button 
                onClick={() => actions.chartShow(focusedShow.id)}
                className="w-full py-3.5 bg-cr-orange rounded-xl flex items-center justify-center gap-2 text-white font-bold active:scale-95 transition-transform animate-glow"
              >
                <iconify-icon icon="lucide:map-pin" width="18" />
                Chart This Show
              </button>
            )}
          </div>
          
          {/* Connections section */}
          <div className="mb-5">
            <h3 className="text-xs font-black uppercase tracking-wider text-cr-text-muted mb-2">
              {isCharted ? 'Connections' : 'Connections (Chart to Reveal)'}
            </h3>
            
            {/* Explanation - only show when charted and has connections */}
            {isCharted && focusedShow.connections?.length > 0 && (
              <p className="text-[10px] text-cr-text-secondary mb-3">
                <span className="text-cr-orange font-bold">Orange labels</span> show what connects these shows.
              </p>
            )}
            
            <div className="space-y-3">
              {/* Actual connections from our curated data */}
              {focusedShow.connections?.map(conn => {
                const connShow = getShow(conn.to);
                if (!connShow) return null;
                const connCharted = state.chartedShows.includes(conn.to);
                const connWatched = state.watchedShows.includes(conn.to);
                const isLocked = !isCharted;
                return (
                  <button 
                    key={conn.to} 
                    onClick={() => { if(!isLocked) actions.navigateToShow(conn.to); }} 
                    disabled={isLocked} 
                    className={`flex gap-4 p-3 bg-cr-surface rounded-2xl border w-full text-left ${isLocked?'border-white/5 opacity-40':connCharted?'border-cr-success/30':connWatched?'border-cr-orange/50 animate-glow':'border-cr-border'} transition-all active:scale-[0.98]`}
                  >
                    <div className={`relative w-[80px] h-[45px] shrink-0 rounded-lg overflow-hidden ${isLocked?'blur-sm':''}`}>
                      <ShowImage showId={conn.to} title={connShow.title} className="w-full h-full object-cover" orientation="landscape" />
                      {isLocked && <div className="absolute inset-0 flex items-center justify-center bg-black/40"><iconify-icon icon="lucide:lock" width="16" class="text-white/60" /></div>}
                      {connCharted && !isLocked && <div className="absolute top-1 right-1 w-4 h-4 bg-cr-success rounded-full flex items-center justify-center"><iconify-icon icon="lucide:check" width="10" class="text-white" /></div>}
                    </div>
                    <div className="flex-1 min-w-0">
                      <span className="text-[9px] font-bold text-cr-orange uppercase block line-clamp-2 leading-relaxed" style={{textWrap:'balance'}}>{isLocked?'???':conn.label}</span>
                      <h4 className="text-sm font-bold text-white line-clamp-2 leading-snug">{isLocked?'???':connShow.title}</h4>
                      {!isLocked && (
                        <span className="text-[10px] text-cr-text-muted">
                          {connCharted ? 'Charted' : connWatched ? 'Ready to chart' : 'Watch to chart'}
                        </span>
                      )}
                    </div>
                    {!isLocked && <iconify-icon icon="lucide:chevron-right" width="16" class="text-cr-text-muted self-center" />}
                  </button>
                );
              })}
              
              {/* "Not in demo" placeholders - only show when charted AND we have fewer connections than expected */}
              {/* Comedy shows may have connections to non-curated cluster shows */}
              {isCharted && focusedShow.genre === 'comedy' && placeholderCount > 0 && [...Array(placeholderCount)].map((_, i) => (
                <div 
                  key={`placeholder-${i}`}
                  className="flex gap-4 p-3 bg-cr-surface/50 rounded-2xl border border-dashed border-cr-border/50 w-full"
                >
                  <div className="w-[80px] h-[45px] shrink-0 rounded-lg bg-cr-bg flex items-center justify-center">
                    <iconify-icon icon="lucide:help-circle" width="20" class="text-cr-text-muted/30" />
                  </div>
                  <div className="flex-1 min-w-0">
                    <span className="text-[9px] font-bold text-cr-text-muted/40 uppercase block">Connection</span>
                    <h4 className="text-sm font-bold text-cr-text-muted/40">Not in demo</h4>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function PinsTab() {
      const { state, actions } = useApp();
      const [currentView, setCurrentView] = useState('categories'); // 'categories' | 'region' | 'genre' | 'milestone' | 'system'
      const [expandedGenres, setExpandedGenres] = useState([]); // Which genres are expanded in detail views
      const [tooltipPin, setTooltipPin] = useState(null); // For requirement tooltip
      const [tooltipPos, setTooltipPos] = useState({ x: 0, y: 0 });
      
      const allPins = ALL_PINS;
      const featuredPin = state.equippedFeaturedPin ? PIN_CATALOG[state.equippedFeaturedPin] : null;
      
      const earnedPinIds = evaluateEarnedPins(state.chartedShows);
      const isPinEarned = (pin) => earnedPinIds.has(pin.id);
      const isNewPin = (pin) => earnedPinIds.has(pin.id) && !state.lastSeenPinIds.includes(pin.id);
      
      // Check if any pin in a set is new (for cascading pips)
      const hasNewInSet = (pins) => pins.some(p => isNewPin(p));
      
      // Determine if a pin shows progress counter or "not in demo"
      // Earnable pins get a progress counter, non-earnable pins get "not in demo"
      const pinShowsProgress = (pin) => {
        return pin.earnable === true;
      };
      
      // Get progress for a pin
      const getPinProgress = (pin) => {
        if (pin.requirement?.type === 'region-count') {
          // Count charted shows in this region
          const regionShows = REGIONS[pin.region]?.shows || [];
          const chartedInRegion = regionShows.filter(id => (state.chartedShows || []).includes(id)).length;
          return { current: chartedInRegion, total: pin.requirement.count, unit: 'shows' };
        }
        if (pin.requirement?.type === 'charted') {
          return { current: (state.chartedShows || []).length, total: pin.requirement.count, unit: 'shows' };
        }
        if (pin.requirement?.type === 'genre-tier') {
          // Genre pins track other pins earned
          const genreRegionPins = allPins.filter(p2 => p2.category === 'region' && p2.genre === pin.genre);
          const pinsNeeded = getGenrePinRequiredCount(pin);
          let current = 0;
          switch(pin.tier) {
            case 'scout': current = genreRegionPins.filter(p2 => p2.tier === 'explorer' && earnedPinIds.has(p2.id)).length; break;
            case 'pathfinder': 
            case 'voyager': current = genreRegionPins.filter(p2 => (p2.tier === 'explorer' || p2.tier === 'expert') && earnedPinIds.has(p2.id)).length; break;
            case 'navigator': current = genreRegionPins.filter(p2 => p2.tier === 'expert' && earnedPinIds.has(p2.id)).length; break;
            case 'cartographer': current = genreRegionPins.filter(p2 => (p2.tier === 'expert' || p2.tier === 'master') && earnedPinIds.has(p2.id)).length; break;
            case 'legend': current = genreRegionPins.filter(p2 => p2.tier === 'master' && earnedPinIds.has(p2.id)).length; break;
          }
          return { current: Math.min(current, pinsNeeded), total: pinsNeeded, unit: 'pins' };
        }
        return null;
      };
      
      // Helper: get required pin count for genre-tier pins
      const getGenrePinRequiredCount = (pin) => {
        const tier = pin.tier;
        if (tier === 'scout') return 4; // 4 Explorer pins
        if (tier === 'pathfinder') return 4; // 1 Expert + 3 Explorers
        if (tier === 'voyager') return 4; // 2 Experts + 2 Explorers
        if (tier === 'navigator') return 4; // 4 Experts
        if (tier === 'cartographer') return 4; // 2 Masters + 2 Experts
        if (tier === 'legend') return 4; // 4 Masters
        return 0;
      };
      
      // Get requirement text for display
      const getRequirementText = (pin) => {
        const req = pin.requirement;
        if (!req) return 'Unknown';
        if (req.type === 'region-count') {
          return `Chart ${req.count} shows in ${pin.regionName}`;
        }
        if (req.type === 'charted') {
          return `Chart ${req.count} shows total`;
        }
        if (req.type === 'genre-tier') {
          return req.reqText || req.needs;
        }
        if (req.type === 'system') {
          return req.reqText || 'Complete advanced cross-genre pins';
        }
        return 'Unknown requirement';
      };
      
      // Category counts - only count pins that are in demo genres for regions/genres
      const demoGenres = ['action', 'comedy'];
      const regionPins = allPins.filter(p => p.category === 'region');
      const genrePins = allPins.filter(p => p.category === 'genre');
      const milestonePins = allPins.filter(p => p.category === 'milestone');
      const systemPins = allPins.filter(p => p.category === 'system');
      
      const toggleGenre = (genreId) => {
        // Only allow toggling for demo genres
        if (!demoGenres.includes(genreId)) return;
        const isExpanding = !expandedGenres.includes(genreId);
        setExpandedGenres(prev => 
          prev.includes(genreId) ? prev.filter(g => g !== genreId) : [...prev, genreId]
        );
        // When expanding, mark all earned pins in this genre as seen
        if (isExpanding) {
          const genrePinIds = allPins
            .filter(p => p.genre === genreId && earnedPinIds.has(p.id))
            .map(p => p.id);
          if (genrePinIds.length > 0) actions.markPinsAsSeen(genrePinIds);
        }
      };
      
      // Region info for grouping (only Action/Comedy have real data)
      const regionGroups = {
        action: [
          { id: 'battle-shounen', name: 'Battle Shounen', icon: 'lucide:flame' },
          { id: 'dark-gritty', name: 'Dark & Gritty', icon: 'lucide:skull' },
          { id: 'historical-action', name: 'Historical Action', icon: 'lucide:scroll' },
          { id: 'over-the-top', name: 'Over the Top', icon: 'lucide:zap' },
        ],
        comedy: [
          { id: 'parody-satire', name: 'Parody & Satire', icon: 'lucide:drama' },
          { id: 'absurd-comedy', name: 'Absurd Comedy', icon: 'lucide:sparkles' },
          { id: 'romantic-comedy', name: 'Romantic Comedy', icon: 'lucide:heart' },
          { id: 'cozy-wholesome', name: 'Cozy & Wholesome', icon: 'lucide:sun' },
        ],
      };
      
      const genreInfo = {
        action: { name: 'Action', icon: 'lucide:sword', color: '#EF4444', inDemo: true },
        comedy: { name: 'Comedy', icon: 'lucide:smile', color: '#F59E0B', inDemo: true },
        romance: { name: 'Romance', icon: 'lucide:heart', color: '#EC4899', inDemo: false },
        scifi: { name: 'Sci-Fi', icon: 'lucide:rocket', color: '#8B5CF6', inDemo: false },
        drama: { name: 'Drama', icon: 'lucide:theater', color: '#06B6D4', inDemo: false },
        thriller: { name: 'Thriller', icon: 'lucide:eye', color: '#10B981', inDemo: false },
      };
      
      const tierOrder = ['scout', 'pathfinder', 'voyager', 'navigator', 'cartographer', 'legend'];
      const regionTierOrder = ['explorer', 'expert', 'master'];
      
      // Pin Card Component - proper size with progress or "not in demo"
      const PinCard = ({ pin }) => {
        const earned = isPinEarned(pin);
        const isNew = isNewPin(pin);
        const isFeatured = state.equippedFeaturedPin === pin.id;
        const showProgress = pinShowsProgress(pin);
        const progress = showProgress ? getPinProgress(pin) : null;
        
        const handleTap = (e) => {
          if (earned) {
            // Toggle featured status
            actions.equipFeaturedPin(isFeatured ? null : pin.id);
          } else {
            // Show tooltip with requirements
            const rect = e.currentTarget.getBoundingClientRect();
            setTooltipPos({ x: rect.left + rect.width / 2, y: rect.top });
            setTooltipPin(pin);
          }
        };
        
        return (
          <button 
            onClick={handleTap}
            className={`relative rounded-xl p-2.5 text-center transition-all w-full ${
              earned 
                ? 'bg-gradient-to-b from-cr-orange/20 to-transparent border border-cr-orange/40' 
                : 'bg-cr-bg/60 border border-cr-border/50'
            } ${isFeatured ? 'ring-2 ring-cr-orange ring-offset-1 ring-offset-cr-bg' : ''}`}
          >
            {/* Featured star indicator */}
            {isFeatured && (
              <div className="absolute -top-1.5 -right-1.5 w-5 h-5 bg-cr-orange rounded-full flex items-center justify-center shadow-lg">
                <iconify-icon icon="lucide:star" width="10" class="text-white" />
              </div>
            )}
            {/* NEW indicator for unseen earned pins */}
            {isNew && !isFeatured && (
              <div className="absolute -top-1 -right-1 h-4 px-1.5 bg-cr-orange rounded-full shadow-lg flex items-center justify-center">
                <span className="text-[7px] font-black text-white tracking-wide leading-none">NEW</span>
              </div>
            )}
            
            {/* Pin icon */}
            <div className={`w-12 h-12 mx-auto mb-1.5 rounded-xl flex items-center justify-center ${
              earned ? 'bg-gradient-to-br from-cr-orange to-orange-600 shadow-lg shadow-cr-orange/20' : 'bg-cr-surface border border-cr-border'
            }`}>
              <PinIcon pinId={pin.id} icon={pin.icon} size={earned ? 24 : 20} earned={earned} />
            </div>
            
            {/* Pin name */}
            <h4 className={`text-[10px] font-bold leading-tight line-clamp-2 min-h-[24px] ${earned ? 'text-white' : 'text-cr-text-muted/70'}`}>
              {pin.name}
            </h4>
            
            {/* Progress counter OR "not in demo" */}
            {showProgress && progress ? (
              <p className={`text-[9px] mt-0.5 ${earned ? 'text-cr-orange' : 'text-cr-text-muted/50'}`}>
                {Math.min(progress.current, progress.total)}/{progress.total} {progress.unit}
              </p>
            ) : (
              <p className="text-[8px] mt-0.5 text-cr-text-muted/40">not in demo</p>
            )}
          </button>
        );
      };
      
      // Category tile for main grid
      const CategoryTile = ({ title, icon, count, total, color, onClick, hasNew }) => (
        <button 
          onClick={onClick}
          className="bg-cr-surface rounded-2xl p-4 border border-cr-border hover:border-cr-border/80 transition-all text-left relative"
        >
          {hasNew && <span className="absolute top-3 right-3 w-2.5 h-2.5 bg-cr-orange rounded-full animate-pulse" />}
          <div className={`w-10 h-10 rounded-xl flex items-center justify-center mb-3`} style={{ backgroundColor: `${color}20` }}>
            <iconify-icon icon={icon} width="20" style={{ color }} />
          </div>
          <h3 className="text-sm font-bold text-white mb-1">{title}</h3>
          <div className="flex items-center justify-between">
            <span className="text-xs text-cr-text-muted">{count}/{total} earned</span>
            <iconify-icon icon="lucide:chevron-right" width="16" class="text-cr-text-muted" />
          </div>
        </button>
      );
      
      // Back button for detail views
      const BackButton = ({ title, count, earned = 0 }) => (
        <button 
          onClick={() => setCurrentView('categories')}
          className="flex items-center gap-2 mb-4 text-cr-text-secondary hover:text-white transition-colors"
        >
          <iconify-icon icon="lucide:arrow-left" width="18" />
          <span className="text-sm">Categories</span>
          <span className="text-xs text-cr-text-muted ml-auto">{title} • {earned}/{count}</span>
        </button>
      );
      
      return (
        <div className="px-4 py-4 pb-6">
          {/* Featured Pin Display */}
          <div className="bg-gradient-to-br from-cr-orange/20 via-cr-surface to-cr-surface rounded-2xl p-4 mb-5 border border-cr-orange/30">
            <div className="flex items-center gap-3">
              <div className={`w-14 h-14 rounded-2xl flex items-center justify-center ${
                featuredPin 
                  ? 'bg-gradient-to-br from-cr-orange to-orange-600 shadow-lg shadow-cr-orange/30' 
                  : 'bg-cr-bg border-2 border-dashed border-cr-border'
              }`}>
                {featuredPin ? (
                  <PinIcon pinId={state.equippedFeaturedPin} icon={featuredPin.icon} size={28} earned={true} />
                ) : (
                  <iconify-icon icon="lucide:plus" width="20" class="text-cr-text-muted" />
                )}
              </div>
              <div className="flex-1">
                <p className="text-[10px] text-cr-text-muted uppercase tracking-wider mb-0.5">Featured Pin</p>
                <h3 className="text-sm font-bold text-white">
                  {featuredPin ? featuredPin.name : 'None Selected'}
                </h3>
                <p className="text-[10px] text-cr-text-secondary">Tap any earned pin to feature it</p>
              </div>
              {featuredPin && (
                <button onClick={() => actions.equipFeaturedPin(null)} className="w-8 h-8 rounded-lg bg-cr-bg/50 flex items-center justify-center">
                  <iconify-icon icon="lucide:x" width="16" class="text-cr-text-muted" />
                </button>
              )}
            </div>
          </div>
          
          {/* Main Categories Grid View */}
          {currentView === 'categories' && (
            <>
              <div className="flex items-center justify-between mb-4 px-1">
                <span className="text-xs text-cr-text-muted">Pin Collection</span>
                <span className="text-xs"><span className="font-bold text-cr-orange">{earnedPinIds.size}</span> / {allPins.length} pins</span>
              </div>
              
              <div className="grid grid-cols-2 gap-3">
                <CategoryTile 
                  title="Regions" 
                  icon="lucide:map-pin" 
                  count={regionPins.filter(p => isPinEarned(p)).length} 
                  total={regionPins.length}
                  color="#06B6D4"
                  onClick={() => setCurrentView('region')}
                  hasNew={hasNewInSet(regionPins)}
                />
                <CategoryTile 
                  title="Genres" 
                  icon="lucide:layers" 
                  count={genrePins.filter(p => isPinEarned(p)).length} 
                  total={genrePins.length}
                  color="#8B5CF6"
                  onClick={() => setCurrentView('genre')}
                  hasNew={hasNewInSet(genrePins)}
                />
                <CategoryTile 
                  title="Milestones" 
                  icon="lucide:trophy" 
                  count={milestonePins.filter(p => isPinEarned(p)).length} 
                  total={milestonePins.length}
                  color="#F59E0B"
                  onClick={() => { setCurrentView('milestone'); actions.markPinsAsSeen(milestonePins.filter(p => earnedPinIds.has(p.id)).map(p => p.id)); }}
                  hasNew={hasNewInSet(milestonePins)}
                />
                <CategoryTile 
                  title="Cross-Genre" 
                  icon="lucide:globe" 
                  count={systemPins.filter(p => isPinEarned(p)).length} 
                  total={systemPins.length}
                  color="#64748B"
                  onClick={() => { setCurrentView('system'); actions.markPinsAsSeen(systemPins.filter(p => earnedPinIds.has(p.id)).map(p => p.id)); }}
                  hasNew={hasNewInSet(systemPins)}
                />
              </div>
            </>
          )}
          
          {/* Region Detail View */}
          {currentView === 'region' && (
            <>
              <BackButton title="Regions" count={regionPins.length} earned={regionPins.filter(p => isPinEarned(p)).length} />
              
              <div className="space-y-3">
                {Object.entries(genreInfo).map(([genreId, info]) => {
                  const isInDemo = info.inDemo;
                  const regions = regionGroups[genreId] || [];
                  const genreRegionPins = regionPins.filter(p => p.genre === genreId);
                  const isExpanded = expandedGenres.includes(genreId);
                  const hasNewInGenre = isInDemo && hasNewInSet(genreRegionPins);
                  
                  return (
                    <div key={genreId} className={`bg-cr-surface rounded-2xl border border-cr-border overflow-hidden ${!isInDemo ? 'opacity-50' : ''}`}>
                      <button 
                        onClick={() => toggleGenre(genreId)}
                        className={`w-full p-3 flex items-center gap-3 ${isExpanded && isInDemo ? 'border-b border-cr-border' : ''} ${!isInDemo ? 'cursor-default' : ''}`}
                        disabled={!isInDemo}
                      >
                        <div className="w-8 h-8 rounded-lg flex items-center justify-center relative" style={{ backgroundColor: isInDemo ? `${info.color}20` : 'rgba(100,100,100,0.2)' }}>
                          <iconify-icon icon={info.icon} width="16" style={{ color: isInDemo ? info.color : '#666' }} />
                          {hasNewInGenre && <span className="absolute -top-1 -right-1 w-2 h-2 bg-cr-orange rounded-full animate-pulse" />}
                        </div>
                        <div className="flex-1 text-left">
                          <h3 className="text-sm font-bold text-white">{info.name}</h3>
                          {!isInDemo && <p className="text-[9px] text-cr-text-muted">Not in demo</p>}
                        </div>
                        {isInDemo ? (
                          <>
                            <span className="text-xs font-bold" style={{ color: info.color }}>{genreRegionPins.filter(p => isPinEarned(p)).length}/{genreRegionPins.length}</span>
                            <iconify-icon icon={isExpanded ? 'lucide:chevron-up' : 'lucide:chevron-down'} width="18" class="text-cr-text-muted" />
                          </>
                        ) : (
                          <iconify-icon icon="lucide:lock" width="14" class="text-cr-text-muted/50" />
                        )}
                      </button>
                      
                      {isExpanded && isInDemo && (
                        <div className="p-3 space-y-4">
                          {regions.map(region => {
                            const rPins = regionPins.filter(p => p.region === region.id).sort((a, b) => 
                              regionTierOrder.indexOf(a.tier) - regionTierOrder.indexOf(b.tier)
                            );
                            const hasNewInRegion = hasNewInSet(rPins);
                            return (
                              <div key={region.id}>
                                <div className="flex items-center gap-2 mb-2">
                                  <iconify-icon icon={region.icon} width="14" class="text-cr-text-muted" />
                                  <span className="text-xs font-medium text-cr-text-secondary">{region.name}</span>
                                  {hasNewInRegion && <span className="w-1.5 h-1.5 bg-cr-orange rounded-full animate-pulse" />}
                                </div>
                                <div className="grid grid-cols-3 gap-2">
                                  {rPins.map(pin => <PinCard key={pin.id} pin={pin} />)}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </>
          )}
          
          {/* Genre Detail View */}
          {currentView === 'genre' && (

    function HomeScreen() {
      const { state, actions, getShow, claimableShows } = useApp();
      
      // Calculate unlocked but unwatched shows for "From Your Atlas" row
      // Different from Discovery Card: broader, region-diverse, excludes claimables
      // Only excludes Discovery Card connections when DC is in STATE 3 (connections mode)
      // When DC is in STATE 2 (claimables), connections aren't shown there, so they're fair game here
      const getAtlasRowShows = () => {
        const unlocked = new Set();
        const watchedSet = new Set(state.watchedShows);
        const chartedSet = new Set(state.chartedShows);
        
        // Only compute DC exclusions when DC would actually show connections (no claimables)
        const discoveryCardIds = new Set();
        if (claimableShows.length === 0) {
          [...state.chartedShows].reverse().forEach(cid => {
            const s = SHOWS[cid];
            if (s?.connections && discoveryCardIds.size < 5) {
              s.connections.forEach(c => {
                if (!chartedSet.has(c.to) && !watchedSet.has(c.to) && SHOWS[c.to] && discoveryCardIds.size < 5) {
                  discoveryCardIds.add(c.to);
                }
              });
            }
          });
        }
        
        // Build unlocked set from charted show connections
        state.chartedShows.forEach(chartedId => {
          const show = SHOWS[chartedId];
          if (show?.connections) {
            show.connections.forEach(conn => unlocked.add(conn.to));
          }
        });
        
        // Add region gateway shows from unlocked regions
        const landmarksCharted = state.chartedShows.filter(id => SHOWS[id]?.tier === 'landmark').length;
        const unlockedRegionCount = landmarksCharted >= 7 ? 4 : landmarksCharted >= 5 ? 3 : landmarksCharted >= 3 ? 2 : landmarksCharted >= 1 ? 1 : 0;
        const genreRegions = { action: ['battle-shounen', 'dark-gritty', 'historical-action', 'over-the-top'], comedy: ['parody-satire', 'absurd-comedy', 'romantic-comedy', 'cozy-wholesome'] };
        ['action', 'comedy'].forEach(genre => {
          genreRegions[genre].slice(0, unlockedRegionCount).forEach(regionId => {
            REGIONS[regionId]?.shows?.forEach(showId => unlocked.add(showId));
          });
        });
        
        // Filter: exists, has title (excludes placeholders), not watched, not charted, not in Discovery Card
        const candidates = [...unlocked]
          .filter(id => SHOWS[id] && SHOWS[id].title && !SHOWS[id].placeholder && !watchedSet.has(id) && !chartedSet.has(id) && !discoveryCardIds.has(id));
        
        // Region-diverse selection: round-robin across regions, max 8
        // Use genre as fallback for landmarks (which have no region)
        const byRegion = {};
        candidates.forEach(id => {
          const show = SHOWS[id];
          const bucket = show?.region || ('landmark-' + (show?.genre || 'other'));
          if (!byRegion[bucket]) byRegion[bucket] = [];
          byRegion[bucket].push(id);
        });
        
        const result = [];
        const regionKeys = Object.keys(byRegion);
        let idx = 0;
        while (result.length < 8 && regionKeys.some(k => byRegion[k].length > 0)) {
          const key = regionKeys[idx % regionKeys.length];
          if (byRegion[key].length > 0) result.push(byRegion[key].shift());
          idx++;
        }
        
        return result;
      };
      
      const atlasShows = getAtlasRowShows();
      
      // Only show if user has charted at least 1 show AND has 3+ unlocked unwatched
      const showAtlasRow = state.chartedShows.length >= 1 && atlasShows.length >= 3;
      
      return (
        <div className="pb-4">
          <HeroCarousel />
          <ShowRow title="Popular in Action" showIds={POPULAR_ACTION} />
          {showAtlasRow && (
            <div className="mb-6">
              <div className="flex items-center justify-between px-4 mb-2">
                <div className="flex items-center gap-2">
                  <iconify-icon icon="lucide:compass" width="16" class="text-cr-orange" />
                  <h2 className="text-base font-bold text-white">From Your Atlas</h2>
                </div>
                <button 
                  onClick={() => actions.openAtlas()}
                  className="text-xs text-cr-orange font-medium"
                >
                  Open Atlas
                </button>
              </div>
              <p className="text-[11px] text-cr-text-muted px-4 mb-3">Shows unlocked by your connections</p>
              <div className="flex gap-3 overflow-x-auto hide-scrollbar px-4 scroll-container">
                {atlasShows.map(showId => {
                  const show = SHOWS[showId];
                  if (!show?.title) return null;
                  // Tier label mapping
                  const tierLabels = { 'gateway': 'Gateway', 'trails': 'On the Trail', 'off-the-map': 'Off the Map', 'hidden': 'Terra Incognita' };
                  const tierLabel = tierLabels[show.tier] || 'On the Trail';
                  return (
                    <button 
                      key={showId}
                      onClick={() => actions.openShowModal(showId)}
                      className="shrink-0 w-[100px] text-left active:scale-95 transition-transform"
                    >
                      <div className="relative aspect-[2/3] rounded-lg overflow-hidden mb-1 border border-cr-orange/30">
                        <ShowImage showId={showId} title={show.title} className="w-full h-full object-cover" />
                        <div className="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent" />
                        <div className="absolute top-1 right-1 w-5 h-5 rounded-full flex items-center justify-center" style={{background: show.genre === 'action' ? 'rgba(239,68,68,0.85)' : 'rgba(245,158,11,0.85)'}}>
                          <iconify-icon icon={show.genre === 'action' ? 'lucide:sword' : 'lucide:smile'} width="10" class="text-white" />
                        </div>
                        <div className="absolute bottom-1 left-1 px-1.5 py-0.5 bg-cr-surface/90 rounded text-[8px] font-bold text-cr-orange uppercase">
                          {tierLabel}
                        </div>
                      </div>
                      <p className="text-xs text-white font-medium line-clamp-1 leading-tight h-[16px]">{show.title}</p>
                    </button>
                  );
                })}
              </div>
            </div>
          )}
          <ShowRow title="Popular in Comedy" showIds={POPULAR_COMEDY} />
        </div>
      );

    function TutorialTrigger() {
      const { state, actions } = useApp();
      const timerRef = useRef(null);
      const initialTab = useRef(state.currentTab);
      const initialModal = useRef(state.showModal);
      const mounted = useRef(false);
      
      // 5 second passive timer
      useEffect(() => {
        if (state.tutorialState !== 'pending' || !state.hasSeenOverlay) return;
        if (state.scenario !== 'EP1' && state.scenario !== 'EP2') return;
        
        mounted.current = true;
        initialTab.current = state.currentTab;
        initialModal.current = state.showModal;
        
        timerRef.current = setTimeout(() => {
          actions.startTutorial();
        }, 5000);
        
        return () => { if (timerRef.current) clearTimeout(timerRef.current); };
      }, [state.tutorialState, state.hasSeenOverlay, state.scenario]);
      
      // Trigger immediately on tab switch or show tap (skip initial values)
      useEffect(() => {
        if (!mounted.current) return;
        if (state.tutorialState !== 'pending' || !state.hasSeenOverlay) return;
        if (state.scenario !== 'EP1' && state.scenario !== 'EP2') return;
        if (state.currentTab === initialTab.current && state.showModal === initialModal.current) return;
        
        if (timerRef.current) clearTimeout(timerRef.current);
        actions.startTutorial();
      }, [state.currentTab, state.showModal]);
      
      return null;
    }

    function BatchClaimTrigger() {
      const { state, actions } = useApp();
      const hasTriggered = useRef(false);
      const delayRef = useRef(null);
      const prevTab = useRef(state.currentTab);
      const prevTutorial = useRef(state.tutorialState);
      
      // Reset trigger ref when switching to a fresh EP2 scenario
      useEffect(() => {
        if (state.batchClaimState === 'pending') {
          hasTriggered.current = false;
          prevTab.current = state.currentTab;
          prevTutorial.current = state.tutorialState;
          if (delayRef.current) clearTimeout(delayRef.current);
        }
      }, [state.batchClaimState]);
      
      // Only fire when: EP2, batch pending, tutorial DONE, on My Lists tab
      useEffect(() => {
        if (state.scenario !== 'EP2' || state.batchClaimState !== 'pending') return;
        if (!state.hasSeenOverlay) return;
        if (state.tutorialState !== 'done') return;
        if (state.currentTab !== 'mylists') return;
        if (hasTriggered.current) return;
        
        hasTriggered.current = true;
        
        // Detect WHY this fired: tab navigation (immediate) vs tutorial just completed on this tab (delay)
        const userJustNavigated = prevTab.current !== 'mylists';
        prevTab.current = state.currentTab;
        prevTutorial.current = state.tutorialState;
        
        const delay = userJustNavigated ? 300 : 2500;
        delayRef.current = setTimeout(() => {
          actions.startBatchClaim();
        }, delay);
        
        return () => { if (delayRef.current) clearTimeout(delayRef.current); };
      }, [state.currentTab, state.tutorialState, state.batchClaimState, state.hasSeenOverlay]);
      
      return null;
    }

        ],
      };
      const preset = EPISODE_PRESETS[state.scenario] || EPISODE_PRESETS.EP1;
      const steps = happyPaths[state.scenario] || happyPaths.EP1;
      return (
        <div className="info-panel">
          <h3>Anime Atlas Demo</h3>
          <p>{preset.label}</p>
          <p style={{fontSize:'11px',color:'#888',marginBottom:'12px'}}>{preset.description}</p>
          <div style={{borderTop:'1px solid #2A2A2A',margin:'12px 0'}} />
          <p style={{fontWeight:600,color:'#fff',marginBottom:'10px'}}>Happy Path:</p>
          {steps.map((step, i) => (
            <div key={i} className="step"><span className="step-num">{i+1}</span><span className="step-text">{step}</span></div>
          ))}
          <div style={{borderTop:'1px solid #2A2A2A',margin:'12px 0'}} />
          <p style={{fontSize:'11px',color:'#666'}}>Portfolio project by Jamie Chu</p>
        </div>
      );
    }

    function Root() {
      return <AppProvider><InfoPanel /><div className="device-frame-wrapper"><div className="device-frame"><App /></div></div></AppProvider>;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
  </script>
</body>
</html>
