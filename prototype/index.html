  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    html, body { margin: 0; padding: 0; font-family: 'Satoshi', sans-serif; background: #1A1A1A; -webkit-font-smoothing: antialiased; overflow: hidden; height: 100%; }
    
    /* Scroll containers - smoother behavior */
    .scroll-container { 
      overflow-y: auto; 
      overflow-x: hidden; 
      -webkit-overflow-scrolling: touch; 
    }
    
    /* Horizontal scroll rows */
    .horizontal-scroll {
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      scroll-snap-type: x proximity;
      scrollbar-width: none;
    }
    .horizontal-scroll::-webkit-scrollbar { display: none; }
    .horizontal-scroll > * { scroll-snap-align: start; }
    
    /* Edge gradient indicators for horizontal scroll */
    .scroll-row-wrapper {
      position: relative;
    }
    .scroll-row-wrapper::before,
    .scroll-row-wrapper::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      width: 24px;
      pointer-events: none;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .scroll-row-wrapper::before {
      left: 0;
      background: linear-gradient(to right, #0D0D0D 0%, transparent 100%);
    }
    .scroll-row-wrapper::after {
      right: 0;
      background: linear-gradient(to left, #0D0D0D 0%, transparent 100%);
    }
    .scroll-row-wrapper.show-left::before { opacity: 1; }
    .scroll-row-wrapper.show-right::after { opacity: 1; }
    
    .device-frame-wrapper { height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 20px; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%); overflow: hidden; }
    .device-frame { width: 390px; height: 844px; max-height: calc(100dvh - 40px); background: #0D0D0D; border-radius: 44px; overflow: hidden; position: relative; box-shadow: 0 0 0 12px #1a1a1a, 0 0 0 14px #333, 0 25px 50px -12px rgba(0,0,0,0.5), 0 0 100px rgba(244,117,33,0.1); }
    @media (max-height: 900px) and (min-width: 431px) { .device-frame { height: calc(100dvh - 40px); } }
    .device-frame::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 35%; height: 28px; background: #0D0D0D; border-radius: 0 0 16px 16px; z-index: 9999; }
    .device-frame::after { content: ''; position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 35%; max-width: 134px; height: 5px; background: #fff; border-radius: 3px; opacity: 0.3; z-index: 9999; }
    .app-container { width: 100%; height: 100%; overflow: hidden; position: relative; }
    @media (max-width: 430px) { .device-frame-wrapper { padding: 0; background: #0D0D0D; } .device-frame { width: 100%; height: 100%; max-height: none; border-radius: 0; box-shadow: none; } .device-frame::before, .device-frame::after { display: none; } }
    
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .touch-target { min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center; }
    
    @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 15px rgba(244,117,33,0.3); } 50% { box-shadow: 0 0 30px rgba(244,117,33,0.6); } }
    .animate-glow { animation: pulse-glow 2s infinite; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
    .animate-float { animation: float 3s ease-in-out infinite; }
    @keyframes celebrate { 0% { transform: scale(0.5); opacity: 0; } 50% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
    .animate-celebrate { animation: celebrate 0.5s ease-out forwards; }
    @keyframes anime-burst { 0% { transform: translate(0,0) scale(0.5); opacity: 1; } 60% { transform: translate(var(--tx),var(--ty)) scale(1.1) rotate(var(--rot)); opacity: 0.9; } 100% { transform: translate(calc(var(--tx) * 1.3), calc(var(--ty) * 1.3)) scale(0) rotate(var(--rot)); opacity: 0; } }
    .anime-symbol { position: absolute; left: 50%; top: 50%; animation: anime-burst var(--dur) ease-out forwards; pointer-events: none; }
    @keyframes slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .animate-slide-up { animation: slide-up 0.3s ease-out; }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeInOut { 0% { opacity: 0; } 15% { opacity: 1; } 75% { opacity: 1; } 100% { opacity: 0; } }
    @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .animate-fade-in { animation: fade-in 0.2s ease-out; }
    
    .placeholder-img { background: linear-gradient(135deg, #2A2A2A 0%, #1A1A1A 100%); display: flex; align-items: center; justify-content: center; }
    
    .info-panel { display: none; }
    @media (min-width: 1100px) {
      .device-frame-wrapper { padding-left: 320px; }
      .info-panel { display: block; position: fixed; top: 50%; left: 24px; transform: translateY(-50%); width: 260px; background: rgba(26,26,26,0.95); border: 1px solid #2A2A2A; border-radius: 16px; padding: 20px; color: white; font-size: 13px; z-index: 100; backdrop-filter: blur(10px); }
      .info-panel h3 { font-size: 14px; font-weight: 800; color: #F47521; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.1em; }
      .info-panel p { color: #B0B0B0; line-height: 1.5; margin-bottom: 8px; }
      .info-panel .step { display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-start; }
      .info-panel .step-num { width: 22px; height: 22px; background: #F47521; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; flex-shrink: 0; }

    }
    
    /* Constellation View */
    .constellation-canvas {
      position: relative;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      touch-action: manipulation;
    }
    .constellation-canvas::-webkit-scrollbar { display: none; }
    .constellation-hex {
      position: absolute;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      pointer-events: none;
      z-index: 0;
    }
    .constellation-node {
      position: absolute;
      border-radius: 50%;
      overflow: hidden;
      transition: transform 0.15s ease, border-color 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
      z-index: 2;
    }
    .constellation-node:active { transform: scale(0.92); }
    .constellation-node img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .constellation-node.node-locked { background: #2A2A2A; border: 1.5px solid #3A3A3A; opacity: 0.5; }
    .constellation-node.node-unlocked { border: 2px solid rgba(255,255,255,0.12); }
    .constellation-node.node-unlocked img { filter: brightness(0.7) saturate(0.75); }
    .constellation-node.node-claimable { border: 2.5px solid #F47521; animation: constellation-pulse 2s ease-in-out infinite; }
    .constellation-node.node-charted { border: 2.5px solid #22C55E; box-shadow: 0 0 10px 2px rgba(34,197,94,0.4); }
    .constellation-node.node-charted img { filter: brightness(1.05) saturate(1.15); }
    .constellation-node.node-landmark { border: 2.5px solid rgba(255,200,60,0.7); box-shadow: 0 0 16px 4px rgba(255,200,60,0.3); z-index: 5 !important; }
    .constellation-node.node-landmark.node-charted { border-color: #22C55E; box-shadow: 0 0 16px 4px rgba(34,197,94,0.5); }
    .constellation-node.node-landmark.node-locked { border: 2px solid rgba(255,200,60,0.3); box-shadow: 0 0 10px 2px rgba(255,200,60,0.1); opacity: 0.7; }
    .constellation-node.node-selected { border-color: #F47521 !important; box-shadow: 0 0 12px 3px rgba(244,117,33,0.5) !important; z-index: 10 !important; }
    @keyframes constellation-pulse {
      0%, 100% { box-shadow: 0 0 4px 1px rgba(244,117,33,0.2); }
      50% { box-shadow: 0 0 14px 4px rgba(244,117,33,0.5); }
    }
    @keyframes here-pulse {
      0%, 100% { box-shadow: 0 0 6px 2px rgba(255,255,255,0.15); }
      50% { box-shadow: 0 0 18px 6px rgba(255,255,255,0.35); }
    }
    .constellation-region-label {
      position: absolute;

      text-transform: uppercase;
      letter-spacing: 0.15em;
      pointer-events: none;
      z-index: 8;
      white-space: nowrap;
    }
    .constellation-region-glow { position: absolute; border-radius: 50%; pointer-events: none; z-index: 0; filter: blur(60px); }
    @keyframes constellationFadeIn {
      from { opacity: 0; transform: scale(0.6); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>

    const ALL_PINS = Object.values(PIN_CATALOG);
    const FRAME_PINS = ['battle-shounen-master','dark-gritty-master','historical-master','over-top-master','parody-master'];
    const BG_PINS = ['action-legend','comedy-legend'];
    
    function evaluateEarnedPins(chartedShows) {
      const charted = chartedShows || [];
      const earnedSet = new Set();
      
      // PASS 1: Region pins (depend on charted shows)
      ALL_PINS.filter(p => p.category === 'region').forEach(pin => {
        if (!pin.earnable) return;
        const regionShows = REGIONS[pin.region]?.shows || [];
        const chartedInRegion = regionShows.filter(id => charted.includes(id)).length;
        if (chartedInRegion >= pin.requirement.count) {
          earnedSet.add(pin.id);
        }
      });
      
      // PASS 2: Genre pins (depend on region pins earned)
      ALL_PINS.filter(p => p.category === 'genre').forEach(pin => {
        if (!pin.earnable) return;
        const genreRegionPins = ALL_PINS.filter(p2 => p2.category === 'region' && p2.genre === pin.genre);
        const earnedExplorers = genreRegionPins.filter(p2 => p2.tier === 'explorer' && earnedSet.has(p2.id)).length;
        const earnedExperts = genreRegionPins.filter(p2 => p2.tier === 'expert' && earnedSet.has(p2.id)).length;
        const earnedMasters = genreRegionPins.filter(p2 => p2.tier === 'master' && earnedSet.has(p2.id)).length;
        
        let earned = false;
        switch(pin.tier) {
          case 'scout': earned = earnedExplorers >= 4; break;
          case 'pathfinder': earned = earnedExperts >= 1 && (earnedExperts + earnedExplorers) >= 4; break;
          case 'voyager': earned = earnedExperts >= 2 && (earnedExperts + earnedExplorers) >= 4; break;
          case 'navigator': earned = earnedExperts >= 4; break;
          case 'cartographer': earned = earnedMasters >= 2 && (earnedMasters + earnedExperts) >= 4; break;
          case 'legend': earned = earnedMasters >= 4; break;
        }
        if (earned) earnedSet.add(pin.id);
      });
      
      // PASS 3: Milestone pins (depend on total charted)
      ALL_PINS.filter(p => p.category === 'milestone').forEach(pin => {
        if (charted.length >= pin.requirement.count) {
          earnedSet.add(pin.id);
        }
      });
      
      return earnedSet;
    }

    // ============================================
    // SHARED SHOW STATE — single source of truth
    // Used by both list view (L3) and constellation view
    // ============================================
    function computeAllShowStates(chartedShows, watchedShows) {
      const charted = new Set(chartedShows || []);
      const watched = new Set(watchedShows || []);
      const claimable = new Set([...watched].filter(id => !charted.has(id)));

      // 1. Compute unlocked regions per genre (same logic as L2)
      const unlockedRegionIds = new Set();
      ['action', 'comedy'].forEach(genreId => {
        const genre = GENRES[genreId];
        if (!genre) return;
        const lc = genre.landmarks.filter(id => charted.has(id)).length;
        const count = lc >= 7 ? 4 : lc >= 5 ? 3 : lc >= 3 ? 2 : lc >= 1 ? 1 : 0;
        genre.regions.slice(0, count).forEach(r => unlockedRegionIds.add(r));
      });

      // 2. Compute connection-based reveals (same logic as L3)
      const revealedByConnection = new Set();
      charted.forEach(chartedId => {
        const show = SHOWS[chartedId];
        if (show?.connections) {
          show.connections.forEach(conn => { if (SHOWS[conn.to]) revealedByConnection.add(conn.to); });
        }
      });

      // 3. Compute state per show
      const states = {};
      Object.keys(SHOWS).forEach(showId => {
        const show = SHOWS[showId];
        if (!show) return;
        if (charted.has(showId)) { states[showId] = 'charted'; return; }
        if (claimable.has(showId)) { states[showId] = 'claimable'; return; }
        if (watched.has(showId)) { states[showId] = 'unlocked'; return; }
        if (show.tier === 'landmark') { states[showId] = 'unlocked'; return; }
        if (show.tier === 'gateway' && unlockedRegionIds.has(show.region)) { states[showId] = 'unlocked'; return; }
        if (revealedByConnection.has(showId)) { states[showId] = 'unlocked'; return; }
        states[showId] = 'locked';
      });
      return states;
    }

    function HeroCarousel() {
      const { actions, getShow } = useApp();
      const [activeIndex, setActiveIndex] = useState(0);
      const [progress, setProgress] = useState(0);
      const [dragStart, setDragStart] = useState(null);
      const [dragEnd, setDragEnd] = useState(null);
      const [isHovering, setIsHovering] = useState(false);
      const minSwipeDistance = 50;
      
      useEffect(() => {
        const interval = setInterval(() => {
          setProgress(p => {
            if (p >= 100) { setActiveIndex(i => (i + 1) % HERO_SHOWS.length); return 0; }
            return p + 2;
          });
        }, 100);
        return () => clearInterval(interval);
      }, [activeIndex]);

      const goNext = () => { setActiveIndex(i => (i + 1) % HERO_SHOWS.length); setProgress(0); };
      const goPrev = () => { setActiveIndex(i => (i - 1 + HERO_SHOWS.length) % HERO_SHOWS.length); setProgress(0); };

      const handleSwipe = () => {
        if (dragStart === null || dragEnd === null) return false;
        const distance = dragStart - dragEnd;
        if (Math.abs(distance) > minSwipeDistance) {
          if (distance > 0) goNext();
          else goPrev();
          return true;
        }
        return false;
      };

      // Touch events for mobile
      const onTouchStart = (e) => { setDragStart(e.targetTouches[0].clientX); setDragEnd(null); };
      const onTouchMove = (e) => { setDragEnd(e.targetTouches[0].clientX); };
      const onTouchEnd = () => { handleSwipe(); setDragStart(null); setDragEnd(null); };
      // Mouse drag for desktop (especially in iframe)
      const onMouseDown = (e) => { setDragStart(e.clientX); setDragEnd(null); };
      const onMouseMove = (e) => { if (dragStart !== null) setDragEnd(e.clientX); };
      const onMouseUp = () => { handleSwipe(); setDragStart(null); setDragEnd(null); };

      const show = getShow(HERO_SHOWS[activeIndex]);
      if (!show) return null;

      return (
        <div 
          className="relative mb-4 select-none" 
          onTouchStart={onTouchStart}
          onTouchMove={onTouchMove}
          onTouchEnd={onTouchEnd}
          onMouseDown={onMouseDown}
          onMouseMove={onMouseMove}
          onMouseUp={onMouseUp}
          onMouseLeave={(e) => { setIsHovering(false); if (dragStart !== null) { handleSwipe(); setDragStart(null); setDragEnd(null); } }}
          onMouseEnter={() => setIsHovering(true)}
        >
          <div 
            onClick={() => actions.openShowModal(show.id)} 
            className="w-full relative aspect-[9/16] max-h-[50vh] overflow-hidden cursor-pointer"
          >
            <ShowImage showId={show.id} title={show.title} className="w-full h-full object-cover" />
            <div className="absolute inset-0 bg-gradient-to-t from-cr-bg via-cr-bg/20 to-transparent pointer-events-none" />
            <div className="absolute bottom-20 left-4 right-4 text-left pointer-events-none">
              <p className="text-[10px] text-cr-text-secondary mb-1">{show.meta}</p>
              <h2 className="text-2xl font-display font-bold text-white mb-2">{show.title}</h2>
              <p className="text-sm text-cr-text-secondary line-clamp-2 min-h-[40px]">{show.foundationRole || 'A must-watch anime'}</p>
            </div>
          </div>
          
          {/* Desktop Arrow Navigation */}
          <button 
            onClick={(e) => { e.stopPropagation(); goPrev(); }}
            className={`absolute left-2 top-1/2 -translate-y-1/2 w-10 h-10 bg-black/60 hover:bg-black/80 rounded-full flex items-center justify-center transition-all z-20 ${isHovering ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}
            style={{ transitionProperty: 'opacity, background-color' }}
          >
            <iconify-icon icon="lucide:chevron-left" width="24" class="text-white" />
          </button>
          <button 
            onClick={(e) => { e.stopPropagation(); goNext(); }}
            className={`absolute right-2 top-1/2 -translate-y-1/2 w-10 h-10 bg-black/60 hover:bg-black/80 rounded-full flex items-center justify-center transition-all z-20 ${isHovering ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}
            style={{ transitionProperty: 'opacity, background-color' }}
          >
            <iconify-icon icon="lucide:chevron-right" width="24" class="text-white" />
          </button>
          
          <div className="absolute bottom-4 left-4 right-4">
            <button onClick={(e) => { e.stopPropagation(); actions.simulateWatch(show.id); actions.openShowModal(show.id); }} className="w-full bg-cr-orange text-white text-sm font-bold py-3 px-4 rounded-lg flex items-center justify-center gap-2 active:scale-95 transition-transform">
              <iconify-icon icon="lucide:play" width="16" /> Simulate Watch
            </button>
          </div>
          <div className="flex justify-center gap-2 mt-3 px-4">
            {HERO_SHOWS.map((_, i) => (
              <button key={i} onClick={() => { setActiveIndex(i); setProgress(0); }} className="h-1 rounded-full bg-cr-border overflow-hidden transition-all" style={{ width: i === activeIndex ? '32px' : '8px' }}>
                {i === activeIndex && <div className="h-full bg-cr-orange rounded-full" style={{ width: `${progress}%` }} />}
              </button>
            ))}
          </div>
        </div>
      );
    }

    function DiscoveryCard() {
      const { state, actions, claimableShows, getShow } = useApp();
      const [carouselIndex, setCarouselIndex] = useState(0);
      const dragStartXRef = React.useRef(null);
      const isDraggingRef = React.useRef(false);
      
      // Shared swipe handler factory — pointer events unify mouse + touch
      const makeSwipeHandlers = (itemCount) => ({
        onPointerDown: (e) => {
          dragStartXRef.current = e.clientX;
          isDraggingRef.current = false;
          e.currentTarget.setPointerCapture(e.pointerId);
        },
        onPointerMove: (e) => {
          if (dragStartXRef.current === null) return;
          if (Math.abs(e.clientX - dragStartXRef.current) > 8) {
            isDraggingRef.current = true;
          }
        },
        onPointerUp: (e) => {
          if (dragStartXRef.current === null) return;
          const diff = dragStartXRef.current - e.clientX;
          if (Math.abs(diff) > 30) {
            if (diff > 0) setCarouselIndex(i => (i + 1) % itemCount);
            else setCarouselIndex(i => (i - 1 + itemCount) % itemCount);
          }
          dragStartXRef.current = null;
        },
        onPointerLeave: () => { dragStartXRef.current = null; },
        // Capture-phase click suppression: kills the click before inner button sees it
        onClickCapture: (e) => {
          if (isDraggingRef.current) {
            e.stopPropagation();
            e.preventDefault();
            isDraggingRef.current = false;
          }
        },
      });
      
      // Reset carousel position on episode switch
      useEffect(() => { setCarouselIndex(0); }, [state.scenario]);
      // Gather connections from charted shows, prioritizing most recently charted
      // Max 5 shows: keeps carousel focused and swipeable
      // Excludes watched shows (those surface as claimables in STATE 2 instead)
      const getAllUnlockedConnections = () => {
        const connections = [];
        const seen = new Set();
        const watchedSet = new Set(state.watchedShows || []);
        
        // Most recently charted show's connections come first
        [...state.chartedShows].reverse().forEach(chartedId => {
          const show = getShow(chartedId);
          if (show?.connections) {
            show.connections.forEach(conn => {
              if (!state.chartedShows.includes(conn.to) && !seen.has(conn.to) && !watchedSet.has(conn.to) && getShow(conn.to) && !getShow(conn.to).placeholder) {
                seen.add(conn.to);
                connections.push({
                  ...conn,
                  fromShow: show
                });
              }
            });
          }
        });
        
        // Cap at 5 — focused, not overwhelming
        return connections.slice(0, 5);
      };
      
      // Get unlocked shows from regions — region-diverse, max 5
      const getUnlockedRegionShows = () => {
        const chartedSet = new Set(state.chartedShows);
        const byRegion = {};
        
        // For each charted show, its region becomes "unlocked"
        const unlockedRegions = new Set();
        state.chartedShows.forEach(showId => {
          const show = getShow(showId);
          if (show?.region) unlockedRegions.add(show.region);
        });
        
        // Group uncharted shows by region
        Object.values(SHOWS).forEach(show => {
          if (show.placeholder) return;
          if (unlockedRegions.has(show.region) && !chartedSet.has(show.id) && !state.watchedShows.includes(show.id)) {
            if (!byRegion[show.region]) byRegion[show.region] = [];
            byRegion[show.region].push(show);
          }
        });
        
        // Round-robin across regions for diversity, max 5
        const result = [];
        const regionKeys = Object.keys(byRegion);
        let idx = 0;
        while (result.length < 5 && regionKeys.some(k => byRegion[k].length > 0)) {
          const key = regionKeys[idx % regionKeys.length];
          if (byRegion[key].length > 0) result.push(byRegion[key].shift());
          idx++;
        }
        
        return result;
      };
      
      const allConnections = getAllUnlockedConnections();
      const unlockedRegionShows = getUnlockedRegionShows();
      
      // L2 pip: check if there are unseen rewards
      const currentEarnedPins = evaluateEarnedPins(state.chartedShows);
      const newRewardCount = Math.max(0, currentEarnedPins.size - state.lastSeenPinCount);
      const hasNewRewards = newRewardCount > 0;
      
      // STATE 1: New user - no charted shows and no claimables
      if (state.chartedShows.length === 0 && claimableShows.length === 0) {
        return (
          <div className="relative rounded-2xl overflow-hidden border border-cr-orange/30">
            <div className="absolute inset-0 bg-gradient-to-br from-cr-orange/15 via-cr-surface to-cr-surface" />
            <div className="absolute inset-0 opacity-10">
              {[...Array(6)].map((_, i) => (
                <div key={i} className="absolute w-1 h-1 bg-white rounded-full" style={{left: `${15 + (i * 14)}%`, top: `${20 + (i % 3) * 25}%`}} />
              ))}
            </div>
            
            <div className="relative p-5 text-center">
              <div className="w-16 h-16 mx-auto mb-3 rounded-2xl bg-gradient-to-br from-cr-orange to-orange-600 flex items-center justify-center shadow-lg shadow-cr-orange/20">
                <iconify-icon icon="lucide:compass" width="32" class="text-white" />
              </div>
              <h3 className="text-lg font-bold text-white mb-1">Anime Atlas</h3>
              <p className="text-sm text-cr-text-secondary mb-4">Discover your next favorite show through connections.</p>
              <button onClick={() => { actions.setAtlasLayer('L1'); actions.openAtlas(); }} className="px-6 py-3 bg-cr-orange text-white font-bold rounded-xl active:scale-95 transition-transform">
                Start Exploring
              </button>
            </div>
          </div>
        );
      }
      
      // STATE 2: Has claimable shows - prioritize this
      if (claimableShows.length > 0) {
        const claimIdx = carouselIndex % claimableShows.length;
        const show = getShow(claimableShows[claimIdx]);
        if (!show) return null;
        
        const handleContinueToAtlas = () => {
          actions.navigateToShow(show.id);
          actions.openAtlas();
        };
        
        const swipeHandlers = makeSwipeHandlers(claimableShows.length);
        
        return (
          <div className="bg-cr-surface rounded-2xl overflow-hidden border-l-4 border-cr-orange">
            <div 
              className="relative aspect-video select-none touch-manipulation"
              {...swipeHandlers}
            >
              <ShowImage showId={show.id} title={show.title} className="w-full h-full object-cover" orientation="landscape" />
              <div className="absolute inset-0 bg-gradient-to-t from-cr-surface via-transparent to-transparent" />
              <div className="absolute top-3 right-3 px-2.5 py-1 bg-cr-orange rounded-full flex items-center gap-1.5"><iconify-icon icon="lucide:sparkles" width="12" class="text-white" /><span className="text-[10px] font-black text-white uppercase leading-none">Ready to Chart</span></div>
            </div>
            <div className="p-4 -mt-6 relative">
              <p className="text-[10px] font-bold text-cr-orange uppercase tracking-wider mb-1">Anime Atlas</p>
              <h3 className="text-lg font-bold text-white mb-3">{show.title}</h3>
              {claimableShows.length > 1 && (
                <div className="flex justify-center gap-1 mb-3">
                  {claimableShows.slice(0,5).map((_,i) => (
                    <button key={i} onClick={() => setCarouselIndex(i)} className="p-1.5">
                      <span className={`block w-2 h-2 rounded-full transition-colors ${i===claimIdx?'bg-cr-orange':'bg-cr-border'}`} />
                    </button>
                  ))}
                  {claimableShows.length > 5 && (
                    <span className="text-[9px] text-cr-text-muted ml-1">+{claimableShows.length - 5}</span>
                  )}
                </div>
              )}
              <button onClick={handleContinueToAtlas} className="w-full bg-cr-orange text-white font-semibold py-3 rounded-xl touch-target active:scale-95 transition-transform flex items-center justify-center gap-2">
                <iconify-icon icon="lucide:map-pin" width="18" />
                Chart in Atlas
              </button>
            </div>
          </div>
        );
      }
      
      // STATE 3: Show connections from ANY charted show (not just most recent)
      if (allConnections.length > 0) {
        const currentConn = allConnections[carouselIndex % allConnections.length];
        const connShow = getShow(currentConn.to);
        
        const handleExploreConnection = () => {
          actions.navigateToShow(currentConn.to);
          actions.openAtlas();
        };
        
        const swipeHandlers = makeSwipeHandlers(allConnections.length);
        
        return (
          <div className="bg-cr-surface rounded-2xl overflow-hidden border-l-4 border-cr-orange relative">
            {hasNewRewards && <span className="absolute top-3 right-3 w-3 h-3 bg-cr-orange rounded-full animate-pulse shadow-lg shadow-cr-orange/40 z-10" />}
            <div className="p-4">
              {/* Clickable breadcrumb header */}
              <button 
                onClick={() => { actions.setAtlasLayer('L1'); actions.openAtlas(); }}
                className="flex items-center gap-2 mb-2 group"
              >
                <iconify-icon icon="lucide:compass" width="16" class="text-cr-orange" />
                <p className="text-[10px] font-bold text-cr-orange uppercase tracking-wider group-hover:underline">Anime Atlas</p>

    // ============================================
    // CONSTELLATION VIEW
    // ============================================
    const TIER_SIZES = { landmark: 44, gateway: 36, trails: 32, offthemap: 28, hidden: 24 };
    const TIER_ORDER = ['landmark', 'gateway', 'trails', 'offthemap', 'hidden'];
    const TIER_DISPLAY = { landmark: 'Landmark', gateway: 'Gateway', trails: 'On the Trail', offthemap: 'Off the Map', hidden: 'Terra Incognita' };
    const HEX_R = 28;
    const HEX_W = Math.sqrt(3) * HEX_R;
    const HEX_H = 2 * HEX_R;
    const HEX_HORIZ = HEX_W;
    const HEX_VERT = 1.5 * HEX_R;
    const HEX_ROW_OFFSET = HEX_W / 2;
    const CANVAS_W = 680;
    const CANVAS_H = 950;
    const REGION_CENTERS = {
      'battle-shounen': { x: 190, y: 200, genre: 'action' },
      'dark-gritty': { x: 490, y: 200, genre: 'action' },
      'historical-action': { x: 190, y: 460, genre: 'action' },
      'over-the-top': { x: 490, y: 460, genre: 'action' },
      'action-landmarks': { x: 340, y: 330, genre: 'action' },
      'parody-satire': { x: 190, y: 570, genre: 'comedy' },
      'absurd-comedy': { x: 490, y: 570, genre: 'comedy' },
      'romantic-comedy': { x: 190, y: 780, genre: 'comedy' },
      'cozy-wholesome': { x: 490, y: 780, genre: 'comedy' },
      'comedy-landmarks': { x: 340, y: 675, genre: 'comedy' },
    };
    const REGION_COLORS = {
      'action-landmarks': { full: 'rgba(200,45,45,0.22)', dim: 'rgba(200,45,45,0.08)' },
      'battle-shounen': { full: 'rgba(180,50,50,0.18)', dim: 'rgba(180,50,50,0.06)' },
      'dark-gritty': { full: 'rgba(90,100,130,0.22)', dim: 'rgba(90,100,130,0.07)' },
      'historical-action': { full: 'rgba(180,130,40,0.20)', dim: 'rgba(180,130,40,0.07)' },
      'over-the-top': { full: 'rgba(180,40,120,0.20)', dim: 'rgba(180,40,120,0.07)' },
      'comedy-landmarks': { full: 'rgba(220,180,20,0.20)', dim: 'rgba(220,180,20,0.07)' },
      'parody-satire': { full: 'rgba(230,140,30,0.18)', dim: 'rgba(230,140,30,0.06)' },
      'absurd-comedy': { full: 'rgba(20,180,180,0.18)', dim: 'rgba(20,180,180,0.06)' },
      'romantic-comedy': { full: 'rgba(200,60,120,0.18)', dim: 'rgba(200,60,120,0.06)' },
      'cozy-wholesome': { full: 'rgba(40,180,90,0.18)', dim: 'rgba(40,180,90,0.06)' },
    };
    const REGION_GLOWS = {
      'action-landmarks': { color: 'rgba(200,45,45,0.06)', size: 140 },
      'battle-shounen': { color: 'rgba(180,50,50,0.04)', size: 180 },
      'dark-gritty': { color: 'rgba(90,100,130,0.05)', size: 180 },
      'historical-action': { color: 'rgba(180,130,40,0.04)', size: 180 },
      'over-the-top': { color: 'rgba(180,40,120,0.04)', size: 180 },
      'comedy-landmarks': { color: 'rgba(220,180,20,0.05)', size: 140 },
      'parody-satire': { color: 'rgba(230,140,30,0.04)', size: 180 },
      'absurd-comedy': { color: 'rgba(20,180,180,0.04)', size: 180 },
      'romantic-comedy': { color: 'rgba(200,60,120,0.04)', size: 180 },
      'cozy-wholesome': { color: 'rgba(40,180,90,0.04)', size: 180 },
    };
    function computeConstellationLayout() {
  const pixToHex = (px, py) => {
    const row = Math.round(py / HEX_VERT);
    const col = Math.round((px - (row % 2 ? HEX_ROW_OFFSET : 0)) / HEX_HORIZ);
    return { col, row };
  };
  const hexToPix = (col, row) => ({
    x: col * HEX_HORIZ + (row % 2 ? HEX_ROW_OFFSET : 0),
    y: row * HEX_VERT
  });
  const hexKey = (col, row) => col + ',' + row;
  const hexNeighbors = (col, row) => {
    const odd = row & 1;
    return odd
      ? [[col,row-1],[col+1,row-1],[col-1,row],[col+1,row],[col,row+1],[col+1,row+1]]
      : [[col-1,row-1],[col,row-1],[col-1,row],[col+1,row],[col-1,row+1],[col,row+1]];
  };
  const getShowsForGroup = (groupId) => {
    if (groupId.includes('landmarks')) {
      const genre = groupId.replace('-landmarks', '');
      return (GENRES[genre]?.landmarks || []).filter(id => SHOWS[id]);
    }
    return (REGIONS[groupId]?.shows || []).filter(id => SHOWS[id]);
  };

  // Genre centroids + totals
  const genreCentroids = {};
  const genreGroups = {};
  ['action', 'comedy'].forEach(genre => {
    const rcs = Object.entries(REGION_CENTERS).filter(([id, c]) => c.genre === genre && !id.includes('landmarks'));
    genreCentroids[genre] = {
      x: rcs.reduce((s, [,c]) => s + c.x, 0) / rcs.length,
      y: rcs.reduce((s, [,c]) => s + c.y, 0) / rcs.length
    };
    const lmId = genre + '-landmarks';
    const regionIds = rcs.map(([id]) => id);
    genreGroups[genre] = {
      landmarkId: lmId, regionIds,
      totalCount: getShowsForGroup(lmId).length + regionIds.reduce((s, rId) => s + getShowsForGroup(rId).length, 0)
    };
  });

  // STEP 1: Grow ONE blob of 216 hexes from the overall centroid
  const totalTarget = Object.values(genreGroups).reduce((s, g) => s + g.totalCount, 0);
  const overallCentroid = {
    x: (genreCentroids.action.x + genreCentroids.comedy.x) / 2,
    y: (genreCentroids.action.y + genreCentroids.comedy.y) / 2
  };
  const blobSeed = pixToHex(overallCentroid.x, overallCentroid.y);
  const frontier = [{ col: blobSeed.col, row: blobSeed.row }];
  const visited = new Set([hexKey(blobSeed.col, blobSeed.row)]);
  const allCells = [];

  while (allCells.length < totalTarget && frontier.length > 0) {
    frontier.sort((a, b) =>
      Math.hypot(a.col - blobSeed.col, a.row - blobSeed.row) -
      Math.hypot(b.col - blobSeed.col, b.row - blobSeed.row)
    );
    const cell = frontier.shift();
    const pix = hexToPix(cell.col, cell.row);
    allCells.push({ col: cell.col, row: cell.row, x: pix.x, y: pix.y });
    for (const [nc, nr] of hexNeighbors(cell.col, cell.row)) {
      const nk = hexKey(nc, nr);
      if (!visited.has(nk)) { visited.add(nk); frontier.push({ col: nc, row: nr }); }
    }
  }

  // STEP 2: Split into genres via multi-seed BFS within the blob
  const blobLookup = new Map();
  allCells.forEach(c => blobLookup.set(hexKey(c.col, c.row), c));
  const genreParts = {
    action: { target: genreGroups.action.totalCount, cells: [], frontier: [], claimed: new Set() },
    comedy: { target: genreGroups.comedy.totalCount, cells: [], frontier: [], claimed: new Set() }
  };
  const genreAssigned = new Set();
  // Seed each genre from closest blob cell to its centroid
  ['action', 'comedy'].forEach(g => {
    const gp = genreParts[g];
    const gc = genreCentroids[g];
    let bestK = null, bestD = Infinity;
    for (const [k, cell] of blobLookup) {
      const d = Math.hypot(cell.x - gc.x, cell.y - gc.y);
      if (d < bestD && !genreAssigned.has(k)) { bestD = d; bestK = k; }
    }
    if (bestK) {
      genreAssigned.add(bestK);
      gp.cells.push(blobLookup.get(bestK));
      gp.claimed.add(bestK);
      const sc = blobLookup.get(bestK);
      for (const [nc, nr] of hexNeighbors(sc.col, sc.row)) {
        const nk = hexKey(nc, nr);
        if (blobLookup.has(nk) && !genreAssigned.has(nk)) gp.frontier.push(nk);
      }
    }
  });
  // Round-robin BFS
  let genreTotal = genreAssigned.size;
  let genreSafety = allCells.length * 10;
  while (genreTotal < allCells.length && genreSafety-- > 0) {
    let grew = false;
    for (const g of ['action', 'comedy']) {
      const gp = genreParts[g];
      if (gp.cells.length >= gp.target) continue;
      gp.frontier = gp.frontier.filter(k => !genreAssigned.has(k) && blobLookup.has(k));
      if (gp.frontier.length === 0) {
        for (const cell of gp.cells) {
          for (const [nc, nr] of hexNeighbors(cell.col, cell.row)) {
            const nk = hexKey(nc, nr);
            if (blobLookup.has(nk) && !genreAssigned.has(nk)) gp.frontier.push(nk);
          }
        }
        gp.frontier = [...new Set(gp.frontier)].filter(k => !genreAssigned.has(k));
        if (gp.frontier.length === 0) continue;
      }
      // Pick closest to genre centroid (with y-bias to keep genres in their halves)
      const gc = genreCentroids[g];
      const midY = (genreCentroids.action.y + genreCentroids.comedy.y) / 2;
      let bestK = null, bestD = Infinity;
      for (const k of gp.frontier) {
        const cell = blobLookup.get(k);
        if (!cell) continue;
        const yPenalty = g === 'action' ? Math.max(0, cell.y - midY) * 1.5 : Math.max(0, midY - cell.y) * 1.5;
        const d = Math.hypot(cell.x - gc.x, cell.y - gc.y) + yPenalty;
        if (d < bestD) { bestD = d; bestK = k; }
      }
      if (!bestK) continue;
      const cell = blobLookup.get(bestK);
      gp.cells.push(cell);
      gp.claimed.add(bestK);
      genreAssigned.add(bestK);
      gp.frontier = gp.frontier.filter(k => k !== bestK);
      genreTotal++;
      grew = true;
      for (const [nc, nr] of hexNeighbors(cell.col, cell.row)) {
        const nk = hexKey(nc, nr);
        if (blobLookup.has(nk) && !genreAssigned.has(nk)) gp.frontier.push(nk);
      }
    }
    if (!grew) break;
  }
  const allGenreHexes = {
    action: genreParts.action.cells,
    comedy: genreParts.comedy.cells
  };
  // Force-assign any remaining unclaimed cells to nearest under-target genre
  for (const [k, cell] of blobLookup) {
    if (genreAssigned.has(k)) continue;
    const da = Math.hypot(cell.x - genreCentroids.action.x, cell.y - genreCentroids.action.y);
    const dc = Math.hypot(cell.x - genreCentroids.comedy.x, cell.y - genreCentroids.comedy.y);
    const target = (allGenreHexes.action.length < genreGroups.action.totalCount && (da <= dc || allGenreHexes.comedy.length >= genreGroups.comedy.totalCount)) ? 'action' : 'comedy';
    allGenreHexes[target].push(cell);
    genreAssigned.add(k);
  }

  // STEP 3: Within each genre, partition into regions via round-robin BFS
  const positions = {};

  ['action', 'comedy'].forEach(genre => {
    const blob = allGenreHexes[genre];
    const centroid = genreCentroids[genre];
    const { landmarkId, regionIds } = genreGroups[genre];

    const blobMap = new Map();
    blob.forEach(cell => blobMap.set(hexKey(cell.col, cell.row), cell));

    const groups = [
      { id: landmarkId, target: getShowsForGroup(landmarkId).length,
        cx: REGION_CENTERS[landmarkId].x, cy: REGION_CENTERS[landmarkId].y,
        cells: [], frontier: [] },
      ...regionIds.map(rId => ({
        id: rId, target: getShowsForGroup(rId).length,
        cx: REGION_CENTERS[rId].x, cy: REGION_CENTERS[rId].y,
        cells: [], frontier: []
      }))
    ];

    const assigned = new Set();

    // Seed each group from closest blob cell
    groups.forEach(g => {
      let bestCell = null, bestDist = Infinity;
      for (const [k, cell] of blobMap) {
        if (assigned.has(k)) continue;
        const d = Math.hypot(cell.x - g.cx, cell.y - g.cy);
        if (d < bestDist) { bestDist = d; bestCell = cell; }
      }
      if (bestCell) {
        const k = hexKey(bestCell.col, bestCell.row);
        assigned.add(k);
        g.cells.push(bestCell);
        for (const [nc, nr] of hexNeighbors(bestCell.col, bestCell.row)) {
          const nk = hexKey(nc, nr);
          if (blobMap.has(nk) && !assigned.has(nk)) g.frontier.push(nk);
        }
      }
    });

    // Round-robin growth within the blob
    let totalAssigned = assigned.size;
    let mainSafety = blob.length * 10;
    while (totalAssigned < blob.length && mainSafety-- > 0) {
      let anyGrew = false;
      for (const g of groups) {
        if (g.cells.length >= g.target) continue;
        g.frontier = g.frontier.filter(k => !assigned.has(k) && blobMap.has(k));
        if (g.frontier.length === 0) {
          for (const cell of g.cells) {
            for (const [nc, nr] of hexNeighbors(cell.col, cell.row)) {
              const nk = hexKey(nc, nr);
              if (blobMap.has(nk) && !assigned.has(nk)) g.frontier.push(nk);
            }
          }
          g.frontier = [...new Set(g.frontier)].filter(k => !assigned.has(k));
          if (g.frontier.length === 0) continue;
        }
        // Pick closest to group center
        let bestKey = null, bestDist = Infinity;
        for (const k of g.frontier) {
          const cell = blobMap.get(k);
          if (!cell) continue;
          const d = Math.hypot(cell.x - g.cx, cell.y - g.cy);
          if (d < bestDist) { bestDist = d; bestKey = k; }
        }
        if (!bestKey) continue;
        const cell = blobMap.get(bestKey);
        assigned.add(bestKey);
        g.cells.push(cell);
        g.frontier = g.frontier.filter(k => k !== bestKey);
        totalAssigned++;
        anyGrew = true;

                      </div>
                      <div className="flex-1 min-w-0">
                        <h4 className="text-sm font-bold text-white truncate">{selectedShow.title}</h4>
                        <div className="flex items-center gap-2 mt-0.5">
                          <span className="text-[10px] text-cr-text-muted uppercase tracking-wider">{TIER_DISPLAY[selectedShow.tier] || 'Show'}</span>
                          {selectedState === 'claimable' && <span className="text-[10px] text-cr-orange">{'\u25CF'} Ready to Chart</span>}
                          {selectedState === 'charted' && <span className="text-[10px] text-[#22C55E]">{'\u25CF'} Charted</span>}
                        </div>
                        <p className="text-[10px] text-cr-text-muted mt-0.5">{selectedShow.meta}</p>
                      </div>
                    </div>
                    <div className="mt-3 flex gap-2">
                      {selectedState === 'claimable' && <button onClick={() => { const id = selectedNode; setSelectedNode(null); onClose(); actions.navigateToShow(id); }} className="flex-1 py-2.5 bg-cr-orange text-white text-xs font-bold rounded-xl active:scale-95 transition-transform">View in Atlas</button>}
                      {selectedState === 'charted' && <button onClick={() => { const id = selectedNode; setSelectedNode(null); onClose(); actions.navigateToShow(id); }} className="flex-1 py-2.5 bg-cr-surface border border-cr-border text-white text-xs font-bold rounded-xl active:scale-95 transition-transform">View Connections</button>}
                      {selectedState === 'unlocked' && <button onClick={() => { const id = selectedNode; setSelectedNode(null); onClose(); actions.navigateToShow(id); }} className="flex-1 py-2.5 bg-cr-surface border border-cr-border text-white text-xs font-bold rounded-xl active:scale-95 transition-transform">View in Atlas</button>}
                      <button onClick={() => setSelectedNode(null)} className="px-4 py-2.5 bg-cr-surface border border-cr-border text-cr-text-muted text-xs rounded-xl active:scale-95 transition-transform"><iconify-icon icon="lucide:x" width="14" /></button>
                    </div>

                )}
              </div>
            </div>
          )}
        </div>
      );
